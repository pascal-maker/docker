# Pre-commit hooks: run `uv run pre-commit install` once to enable.
# See https://pre-commit.com
default_language_version:
  python: python3.12

repos:
  # Python: format + lint (uses project ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Terraform: format (runs when infra/*.tf or infra/**/*.tfvars are staged)
  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform format
        entry: make infra-fmt
        language: system
        pass_filenames: false
        files: ^infra/.*\.(tf|tfvars)$

  # Local: no-dict-sig, Python typecheck, TS format/lint/typecheck
  - repo: local
    hooks:
      - id: check-no-dict-sig
        name: No dict in function signatures
        entry: make check-no-dict-sig
        language: system
        pass_filenames: false
      - id: ts-format
        name: TS format check
        entry: make ts-format-check
        language: system
        pass_filenames: false
      - id: python-typecheck
        name: Python typecheck (mypy + pyright)
        entry: bash -c "cd apps/backend && uv run mypy src && uv run pyright src"
        language: system
        pass_filenames: false
      - id: ts-checks
        name: TS lint + typecheck
        entry: bash -c "pnpm --filter @refactor-agent/design-system run build 2>/dev/null || true && make ts-lint ts-typecheck"
        language: system
        pass_filenames: false
