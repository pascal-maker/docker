services:
  # NGINX Reverse Proxy / Load Balancer (External facing)
  proxy:
    image: nginx:alpine
    container_name: proxy
    ports:
      - "${PROXY_PORT:-8080}:80"
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - proxy_logs:/var/log/nginx-persist
    networks:
      - frontend
      - backend
    depends_on:
      webapp1:
        condition: service_healthy
      webapp2:
        condition: service_healthy
      webapp3:
        condition: service_healthy
      internal-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: ${RESTART_POLICY:-unless-stopped}

  # Web Application Instance 1
  webapp1:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.14}
        APP_PORT: 5000
    container_name: webapp1
    expose:
      - "5000"
    environment:
      - INSTANCE_NAME=${WEBAPP1_NAME:-WebApp-1}
      - INSTANCE_COLOR=${WEBAPP1_COLOR:-#FF6B6B}
    networks:
      - frontend
      - backend
    depends_on:
      internal-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: ${RESTART_POLICY:-unless-stopped}

  # Web Application Instance 2
  webapp2:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.14}
        APP_PORT: 5000
    container_name: webapp2
    expose:
      - "5000"
    environment:
      - INSTANCE_NAME=${WEBAPP2_NAME:-WebApp-2}
      - INSTANCE_COLOR=${WEBAPP2_COLOR:-#4ECDC4}
    networks:
      - frontend
      - backend
    depends_on:
      internal-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: ${RESTART_POLICY:-unless-stopped}

  # Web Application Instance 3
  webapp3:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.14}
        APP_PORT: 5000
    container_name: webapp3
    expose:
      - "5000"
    environment:
      - INSTANCE_NAME=${WEBAPP3_NAME:-WebApp-3}
      - INSTANCE_COLOR=${WEBAPP3_COLOR:-#45B7D1}
    networks:
      - frontend
      - backend
    depends_on:
      internal-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: ${RESTART_POLICY:-unless-stopped}

  # Internal API Service (Backend only - NOT accessible externally)
  internal-api:
    build:
      context: ./internal-api
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.14}
        APP_PORT: 5000
    container_name: internal-api
    expose:
      - "5000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: ${RESTART_POLICY:-unless-stopped}

networks:
  frontend:
    driver: bridge
    name: ${FRONTEND_NETWORK:-frontend}
  backend:
    driver: bridge
    internal: true
    name: ${BACKEND_NETWORK:-backend}

volumes:
  proxy_logs:
    name: ${PROXY_LOGS_VOLUME:-proxy_logs}
