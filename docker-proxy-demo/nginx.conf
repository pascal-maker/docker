events {
    worker_connections 1024;
}

http {
    # Load-balanced upstream (three web app instances)
    upstream webapp_backend {
        server webapp1:5000;
        server webapp2:5000;
        server webapp3:5000;
    }

    # Single internal service upstream (private backend API)
    upstream internal_api_backend {
        server internal-api:5000;
    }

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=5s;

    # Proxy timeout settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    server {
        listen 80;
        server_name localhost;

        # Default route: reverse proxy + load balancing to web apps
        location / {
            proxy_pass http://webapp_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Name nginx-reverse-proxy;
            add_header X-Proxy-Server "nginx-reverse-proxy" always;
            add_header X-Demo-Mode "proxy+load-balancer" always;
        }

        # Explicit proxied endpoint to a load-balanced application API
        location = /webapp-api {
            proxy_pass http://webapp_backend/api/info;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Name nginx-reverse-proxy;
            add_header X-Proxy-Server "nginx-reverse-proxy" always;
            add_header X-Demo-Mode "proxy+load-balanced-api" always;
        }

        # Explicit reverse proxy route to a private backend-only service
        location = /internal-api {
            return 301 /internal-api/;
        }

        location /internal-api/ {
            proxy_pass http://internal_api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Name nginx-reverse-proxy;
            add_header X-Proxy-Server "nginx-reverse-proxy" always;
            add_header X-Demo-Mode "reverse-proxy-to-private-service" always;
        }

        # Route to service running in a separate compose project
        location = /external-project {
            return 301 /external-project/;
        }

        location /external-project/ {
            set $external_upstream http://external-web:5050;
            rewrite ^/external-project/(.*) /$1 break;
            proxy_pass $external_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Name nginx-reverse-proxy;
            add_header X-Proxy-Server "nginx-reverse-proxy" always;
            add_header X-Demo-Mode "cross-compose-shared-frontend-network" always;
        }

        # Small endpoint that explains proxy routes
        location = /proxy-info {
            default_type application/json;
            return 200 '{"proxy":"nginx","role":"reverse-proxy","load_balanced_routes":["/","/webapp-api"],"private_service_route":"/internal-api/*","note":"internal-api has no published host port and is reachable externally only through this proxy."}';
        }

        # Comparison endpoint for demo narration
        location = /proxy-vs-lb {
            default_type application/json;
            return 200 '{"reverse_proxy":{"what":"single public entrypoint that forwards requests","routes":["/proxy-info","/internal-api/*","/external-project/*"],"behavior":"path-based routing and header forwarding"},"load_balancer":{"what":"spreads requests over multiple instances","routes":["/","/webapp-api"],"strategy":"round-robin across webapp1, webapp2, webapp3"},"cross_compose_demo":{"route":"/external-project/info","target":"external-web:5050","network":"shared frontend external network"},"summary":"In this demo, nginx is both a reverse proxy and a load balancer."}';
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Status page (optional - shows nginx status)
        location /nginx-status {
            stub_status on;
            access_log off;
        }
    }

    # Logging to persisted files (mounted Docker volume)
    access_log /var/log/nginx-persist/proxy-access.log;
    error_log /var/log/nginx-persist/proxy-error.log warn;
}
