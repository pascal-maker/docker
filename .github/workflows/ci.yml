name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Format check
        run: uv run ruff format --check src tests scripts

      - name: Lint
        run: uv run ruff check src tests scripts

      - name: Type check
        run: uv run mypy src

      - name: Test
        run: uv run pytest
