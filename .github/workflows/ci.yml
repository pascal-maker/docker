name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Python backend ---
  py-backend-format-check:
    name: Python · Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Format check
        working-directory: apps/backend
        run: uv run ruff format --check --diff src tests scripts

  py-backend-no-dict-sig:
    name: Python · No dict in function signatures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: No dict in function signatures
        run: uv run python scripts/lint/check_no_dict_sig.py

  py-backend-lint:
    name: Python · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Lint
        working-directory: apps/backend
        run: uv run ruff check src tests scripts

  py-backend-typecheck:
    name: Python · Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Type check
        working-directory: apps/backend
        run: uv run mypy src

  py-backend-test:
    name: Python · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install TS workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        working-directory: apps/backend
        run: uv run pytest

  py-backend-dead-code:
    name: Python · Dead code (Vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Vulture (dead code)
        working-directory: apps/backend
        run: uv run vulture src tests scripts

  py-backend-deprecation:
    name: Python · Deprecation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Flake8 deprecation
        working-directory: apps/backend
        run: uv run flake8 --select=D src tests scripts

  # --- Python functions ---
  py-functions-format-check:
    name: Functions · Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Format check
        run: uv run --package refactor-agent ruff format --check functions/

  py-functions-lint:
    name: Functions · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Lint
        run: uv run --package refactor-agent ruff check functions/

  # --- TypeScript ---
  ts-format-check:
    name: TS · Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
          restore-keys: nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base for affected
        run: git fetch origin ${{ github.base_ref || 'main' }} || true

      - name: Format check
        run: pnpm exec nx affected -t format-check --base=origin/${{ github.base_ref || 'main' }} --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest || pnpm exec nx run-many -t format-check --all --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest

  ts-lint:
    name: TS · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
          restore-keys: nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base for affected
        run: git fetch origin ${{ github.base_ref || 'main' }} || true

      - name: Lint
        run: pnpm exec nx affected -t lint --base=origin/${{ github.base_ref || 'main' }} --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest || pnpm exec nx run-many -t lint --all --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest

  ts-typecheck:
    name: TS · Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
          restore-keys: nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base for affected
        run: git fetch origin ${{ github.base_ref || 'main' }} || true

      - name: Build @refactor-agent/design-system (required by dashboard)
        run: pnpm --filter @refactor-agent/design-system run build

      - name: Typecheck
        run: pnpm exec nx affected -t typecheck --base=origin/${{ github.base_ref || 'main' }} --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest || pnpm exec nx run-many -t typecheck --all --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest

  ts-knip:
    name: TS · Knip (dead code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Knip (dead code, unused exports)
        run: pnpm run knip

  # --- Infrastructure ---
  infra-terraform:
    name: Infra · Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.5"
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check -recursive -diff

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - run: npx nx fix-ci
      if: always()
