name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Format check
        working-directory: apps/backend
        run: uv run ruff format --check --diff src tests scripts

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Lint
        working-directory: apps/backend
        run: uv run ruff check src tests scripts

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Type check
        working-directory: apps/backend
        run: uv run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install TS workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        working-directory: apps/backend
        run: uv run pytest

  ts-format-check:
    name: TS format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
          restore-keys: nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base for affected
        run: git fetch origin ${{ github.base_ref || 'main' }} || true

      - name: Format check
        run: pnpm exec nx affected -t format-check --base=origin/${{ github.base_ref || 'main' }} --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest || pnpm exec nx run-many -t format-check --all --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest

  ts-lint:
    name: TS lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
          restore-keys: nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base for affected
        run: git fetch origin ${{ github.base_ref || 'main' }} || true

      - name: Lint
        run: pnpm exec nx affected -t lint --base=origin/${{ github.base_ref || 'main' }} --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest || pnpm exec nx run-many -t lint --all --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest

  ts-typecheck:
    name: TS typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
          restore-keys: nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base for affected
        run: git fetch origin ${{ github.base_ref || 'main' }} || true

      - name: Build @refactor-agent/design-system (required by dashboard)
        run: pnpm --filter @refactor-agent/design-system run build

      - name: Typecheck
        run: pnpm exec nx affected -t typecheck --base=origin/${{ github.base_ref || 'main' }} --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest || pnpm exec nx run-many -t typecheck --all --exclude=backend,fn-auth-callback,fn-auth-register-device,fn-email-notify,fn-github-webhook,fn-usage-digest

  ts-knip:
    name: TS Knip (dead code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Knip (dead code, unused exports)
        run: pnpm run knip

  dead-code:
    name: Python dead code (Vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Vulture (dead code)
        working-directory: apps/backend
        run: uv run vulture src tests scripts

  deprecation-check:
    name: Python deprecation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Flake8 deprecation
        working-directory: apps/backend
        run: uv run flake8 --select=D src tests scripts

  functions-format-check:
    name: Functions format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Format check
        run: uv run --package refactor-agent ruff format --check functions/

  functions-lint:
    name: Functions lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-

      - run: uv sync

      - name: Lint
        run: uv run --package refactor-agent ruff check functions/

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.5"
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check -recursive -diff

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate
