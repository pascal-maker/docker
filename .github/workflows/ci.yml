name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Format check
        run: uv run ruff format --check --diff src tests scripts

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Lint
        run: uv run ruff check src tests scripts

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Type check
        run: uv run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: uv sync

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install TS workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: uv run pytest

  ts-format-check:
    name: TS format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm --filter dashboard-design-system run format-check && pnpm --filter site run format-check && pnpm --filter @refactor-agent/design-system run format-check && pnpm --filter ts-morph-bridge run format-check && pnpm --filter refactor-agent run format-check

  ts-lint:
    name: TS lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter dashboard-design-system run lint && pnpm --filter site run lint && pnpm --filter @refactor-agent/design-system run lint && pnpm --filter ts-morph-bridge run lint && pnpm --filter refactor-agent run lint

  ts-typecheck:
    name: TS typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @refactor-agent/design-system (required by dashboard-design-system)
        run: pnpm --filter @refactor-agent/design-system run build

      - name: Typecheck
        run: pnpm --filter dashboard-design-system run typecheck && pnpm --filter site run typecheck && pnpm --filter @refactor-agent/design-system run typecheck && pnpm --filter ts-morph-bridge run typecheck && pnpm --filter refactor-agent run typecheck

  ts-knip:
    name: TS Knip (dead code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Knip (dead code, unused exports)
        run: pnpm run knip

  dead-code:
    name: Python dead code (Vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Vulture (dead code)
        run: uv run vulture src tests scripts

  deprecation-check:
    name: Python deprecation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Flake8 deprecation
        run: uv run flake8 --select=D src tests scripts

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check -recursive -diff

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate
