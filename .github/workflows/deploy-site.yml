# Build and deploy the marketing site to Firebase Hosting.
# Trigger: push to main when site/ or functions/ change, or manual.
# Requires: FIREBASE_SERVICE_ACCOUNT, VITE_GITHUB_APP_CLIENT_ID (or VITE_GITHUB_OAUTH_CLIENT_ID), VITE_AUTH_CALLBACK_URL.
# Optional (Terraform sync): VITE_IMPRINT_NAME, VITE_IMPRINT_EMAIL, VITE_PRIVACY_POLICY_URL,
# VITE_TERMS_URL, VITE_FIREBASE_MEASUREMENT_ID.

name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "functions/**"
      - "packages/design-system/**"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @refactor-agent/design-system
        run: pnpm --filter @refactor-agent/design-system run build

      - name: Build site
        env:
          VITE_GITHUB_APP_CLIENT_ID: ${{ secrets.VITE_GITHUB_APP_CLIENT_ID }}
          VITE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}
          VITE_AUTH_CALLBACK_URL: ${{ secrets.VITE_AUTH_CALLBACK_URL }}
          VITE_IMPRINT_NAME: ${{ vars.VITE_IMPRINT_NAME }}
          VITE_IMPRINT_EMAIL: ${{ vars.VITE_IMPRINT_EMAIL }}
          VITE_PRIVACY_POLICY_URL: ${{ vars.VITE_PRIVACY_POLICY_URL }}
          VITE_TERMS_URL: ${{ vars.VITE_TERMS_URL }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
        run: pnpm --filter site run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
