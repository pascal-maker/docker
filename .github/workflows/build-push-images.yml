# Build and push A2A server image to Artifact Registry.
# One version tag (e.g. v0.2.0): build once, deploy to staging then promote same image to production.
# Triggers: push tag v* or publish GitHub Release. Requires: GCP_PROJECT_ID, GCP_SA_KEY.
name: Build and push images

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION || 'europe-west1' }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push A2A server image
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION || 'europe-west1' }}"
          REPO="${REGION}-docker.pkg.dev/${PROJECT_ID}/refactor-agent"
          IMAGE="${REPO}/a2a-server:${{ steps.tag.outputs.tag }}"
          docker pull "${IMAGE}" || true
          docker build --cache-from "${IMAGE}" -t "${IMAGE}" .
          docker push "${IMAGE}"

  deploy-staging:
    name: Deploy to staging
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    if: github.event_name == 'push' && startsWith(github.ref_name, 'v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
          STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET || format('{0}-terraform-state', secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID) }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="prefix=refactor-agent-infra"

      - name: Terraform apply (staging)
        working-directory: infra
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
          TAG: ${{ needs.build-push.outputs.tag }}
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ vars.GCP_REGION || 'europe-west1' }}
          TF_VAR_a2a_min_instance_count: 1
          TF_VAR_anthropic_api_key: ${{ secrets.TF_VAR_anthropic_api_key }}
          TF_VAR_chainlit_auth_secret: ${{ secrets.TF_VAR_chainlit_auth_secret }}
        run: |
          export TF_VAR_a2a_image="${REGION}-docker.pkg.dev/${PROJECT_ID}/refactor-agent/a2a-server:${TAG}"
          terraform apply -auto-approve -input=false

      - name: Get A2A URL
        id: a2a_url
        working-directory: infra
        run: echo "url=$(terraform output -raw a2a_url)" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run security tests
        env:
          A2A_URL: ${{ steps.a2a_url.outputs.url }}
        run: uv run pytest tests/security/ -v
