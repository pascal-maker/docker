    "E501", "PLR0911", "PLR0915", "TC001", "TC002",
]
"apps/backend/src/refactor_agent/agent/factory.py" = ["E501"]
"apps/backend/src/refactor_agent/agent/tools.py" = ["TC001", "TC002", "ARG001"]
"apps/backend/src/refactor_agent/engine/subprocess_engine.py" = ["TC003"]
"apps/backend/src/refactor_agent/engine/typescript/ts_morph_engine.py" = ["E501"]
"apps/backend/src/refactor_agent/schedule/models.py" = ["E501"]
"apps/backend/src/refactor_agent/orchestrator/agent.py" = ["E501"]
"apps/backend/src/refactor_agent/auth/**/*.py" = [
    "TC001", "TC002", "PLC0415", "S310", "PLR2004", "PLR0911", "TRY300",
    "E501", "RUF006",
]
"apps/backend/src/refactor_agent/sync/**/*.py" = [
    "TC002", "TC003", "E501", "ASYNC240", "PLR0911", "PLR0912", "PLR0915",
    "C901", "S104", "S603", "S607", "D301", "TRY300",
