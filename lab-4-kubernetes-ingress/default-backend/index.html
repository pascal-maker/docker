<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container { max-width: 500px; padding: 2rem; }
    h1 { font-size: 6rem; color: #6366f1; font-weight: 800; }
    h2 { font-size: 1.5rem; margin: 1rem 0; }
    p  { color: #94a3b8; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The route you requested doesn't exist in this Kubernetes cluster.<br/>Check your Ingress rules or try a different path.</p>
    <div class="badge">Kubernetes Default Backend</div>
  </div>
</body>
</html>
